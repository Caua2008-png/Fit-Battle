<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitBattle - Registre-se</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js"></script>
</head>
<body>

  <div class="card">

    <div class="left-panel">
      <h1 class="title">REGISTRE-SE</h1>
      <p class="subtitle">Crie sua conta e entre na competição</p>

      <form id="registerForm" class="register-form" novalidate>

        <div class="field">
          <label for="usuario">Usuário:</label>
          <input type="text" id="usuario" name="usuario" placeholder="Seu nome" required>
        </div>

        <div class="field">
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" placeholder="seu@email.com" required>
        </div>

        <div class="field">
          <label for="senha">Senha:</label>
          <input type="password" id="senha" name="senha" placeholder="Mínimo 8 caracteres" minlength="8" required>
        </div>

        <div class="field">
          <label for="confirmaSenha">Confirme a senha:</label>
          <input type="password" id="confirmaSenha" name="confirmaSenha" placeholder="Repita a senha" minlength="8" required>
        </div>

        <span class="error-message" id="errorMessage"></span>

        <button type="submit" class="btn-cadastrar">CADASTRE-SE</button>
      </form>

      <div class="login-section">
        <p class="login-text">ja tem uma conta? <a href="#" class="login-link">Faça login</a></p>
        <p class="terms-text">
          Ao se cadastrar, você concorda com os
          <a href="#" class="terms-link">Termos de Uso</a> e a
          <a href="#" class="terms-link">Política de Privacidade</a> do FitBattle.
        </p>
      </div>
    </div>

    <div class="right-panel">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 120 110" xmlns="http://www.w3.org/2000/svg">
          <!-- Letter F -->
          <path d="M10 10 L10 100 L28 100 L28 65 L55 65 L55 50 L28 50 L28 25 L62 25 L62 10 Z" fill="#ffffff"/>
          <!-- Lightning bolt forming the 3 -->
          <path d="M95 5 L55 55 L78 55 L45 105 L110 45 L85 45 Z" fill="#1ec8ff"/>
        </svg>
        <div class="logo-text">
          <span class="logo-fit">Fit</span><span class="logo-battle">Battle</span>
        </div>
      </div>
      <p class="tagline">Treine. Compete. Evolua.</p>

      <div class="social-section">
        <div class="social-icon"></div>
        <span class="social-text">Siga-nos nas redes sociais</span>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
